name: PowerShell Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path .\win_update_util.ps1 -EnableExit
